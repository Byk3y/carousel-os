<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family={{fontCta}}:wght@700;900&family={{fontBody}}:wght@400;500&family={{fontSmall}}&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    font-family: '{{fontBody}}', sans-serif;
    position: relative;
    overflow: hidden;
    background: {{ctaBackground}};
  }
  .bg-image {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }
  .overlay.has-image {
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.3) 100%);
  }
  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 120px {{padding}}px;
    text-align: center;
  }
  .top-section {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .logo {
    margin-bottom: 24px;
  }
  .divider {
    width: 80px;
    height: 4px;
    opacity: 0.4;
    border: none;
  }
  /* Colors adapt based on whether there's a background image */
  .has-image ~ .content .headline,
  .has-image ~ .content .subtitle,
  .has-image ~ .content .handle-large,
  .has-image ~ .content .logo { color: #FFFFFF; }
  .has-image ~ .content .divider { background: #FFFFFF; }

  .no-image ~ .content .headline { color: {{ctaText}}; }
  .no-image ~ .content .subtitle { color: {{ctaText}}; }
  .no-image ~ .content .handle-large { color: {{ctaText}}; }
  .no-image ~ .content .logo { color: {{ctaText}}; }
  .no-image ~ .content .divider { background: {{ctaText}}; }

  .middle-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }
  .headline {
    font-family: '{{fontCta}}', serif;
    font-size: 78px;
    font-weight: 900;
    line-height: 1.08;
    max-width: 880px;
  }
  .subtitle {
    font-family: '{{fontBody}}', sans-serif;
    font-size: 34px;
    opacity: 0.85;
    line-height: 1.4;
  }
  .handle-large {
    font-family: '{{fontSmall}}', monospace;
    font-size: 28px;
    opacity: 0.6;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  {{ctaImageTag}}
  <div class="overlay {{ctaOverlayClass}}"></div>
  <div class="content">
    <div class="top-section">
      <div class="logo">{{logoSvg}}</div>
      <hr class="divider">
    </div>
    <div class="middle-section">
      <div class="headline">{{headline}}</div>
      <div class="subtitle">{{subtitle}}</div>
    </div>
    <div class="handle-large">{{handle}}</div>
  </div>
</body>
</html>
