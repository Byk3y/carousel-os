<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family={{fontBody}}:wght@400;500;700&family={{fontSmall}}&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    background: {{textPrimary}};
    display: flex;
    flex-direction: column;
    font-family: '{{fontBody}}', sans-serif;
    padding: 56px 56px;
  }
  /* Top row: handle + slide counter */
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
    flex-shrink: 0;
  }
  .handle-top {
    font-family: '{{fontSmall}}', monospace;
    font-size: 20px;
    color: #FFFFFF;
    opacity: 0.5;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .slide-counter {
    font-family: '{{fontSmall}}', monospace;
    font-size: 22px;
    color: #FFFFFF;
    opacity: 0.5;
    font-weight: 700;
  }
  /* Optional context label above the screenshot */
  .context-label {
    font-family: '{{fontSmall}}', monospace;
    font-size: 22px;
    color: {{accent}};
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 18px;
    flex-shrink: 0;
  }
  /* Optional context caption above the screenshot */
  .context-caption {
    font-family: '{{fontBody}}', sans-serif;
    font-size: 30px;
    color: #FFFFFF;
    line-height: 1.4;
    margin-bottom: 32px;
    font-weight: 500;
    flex-shrink: 0;
  }
  /* Screenshot frame — white card with rounded corners and subtle shadow */
  .screenshot-frame {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border-radius: 18px;
    background: #FFFFFF;
    box-shadow: 0 12px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.08);
    position: relative;
  }
  .screenshot-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }
  /* Bottom row: handle */
  .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
    flex-shrink: 0;
  }
  .handle-bottom {
    font-family: '{{fontSmall}}', monospace;
    font-size: 18px;
    color: #FFFFFF;
    opacity: 0.4;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .swipe {
    font-size: 28px;
    color: {{accent}};
    opacity: 0.6;
  }
</style>
</head>
<body>
  <div class="top-row">
    <div class="handle-top">{{handle}}</div>
    <div class="slide-counter">{{number}}</div>
  </div>
  <div class="context-label">{{label}}</div>
  <div class="context-caption">{{body}}</div>
  <div class="screenshot-frame">
    <img src="{{imagePath}}">
  </div>
  <div class="bottom-row">
    <div class="handle-bottom">{{handle}}</div>
    <div class="swipe">→</div>
  </div>

  <script>
    // Hide context-label and context-caption if empty (clean layout when no context provided)
    const label = document.querySelector('.context-label');
    if (!label.textContent.trim()) label.style.display = 'none';
    const caption = document.querySelector('.context-caption');
    if (!caption.textContent.trim()) caption.style.display = 'none';

    // If both are hidden, give the screenshot frame more breathing room
    if (label.style.display === 'none' && caption.style.display === 'none') {
      document.body.style.padding = '80px 56px';
    }

    // Auto-size context caption based on length
    const len = caption.textContent.length;
    if (len > 0) {
      if (len < 60) caption.style.fontSize = '38px';
      else if (len < 120) caption.style.fontSize = '34px';
      else if (len < 200) caption.style.fontSize = '30px';
      else if (len < 300) caption.style.fontSize = '26px';
      else caption.style.fontSize = '22px';
    }
  </script>
</body>
</html>
