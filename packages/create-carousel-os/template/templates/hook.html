<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family={{fontHeadline}}:wght@400;500;700&family={{fontBody}}:wght@400;500&family={{fontSmall}}&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    background: {{hookBackground}};
    font-family: '{{fontBody}}', sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: {{padding}}px;
    position: relative;
    overflow: hidden;
  }
  .label {
    font-family: '{{fontSmall}}', monospace;
    font-size: 24px;
    color: {{textPrimary}};
    opacity: 0.8;
    margin-bottom: 28px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .headline {
    font-family: '{{fontHeadline}}', sans-serif;
    font-weight: 400;
    color: {{textPrimary}};
    line-height: 0.95;
    margin-bottom: 36px;
    text-transform: uppercase;
    font-size: 105px; /* fallback sensible middle size — script below overrides based on length */
  }
  .headline .highlight {
    color: {{hookHighlight}};
  }
  .subtitle {
    font-family: '{{fontBody}}', sans-serif;
    font-size: 34px;
    color: {{textPrimary}};
    opacity: 0.85;
    line-height: 1.4;
    max-width: 800px;
  }
  .footer {
    position: absolute;
    bottom: {{padding}}px;
    left: {{padding}}px;
    right: {{padding}}px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .handle {
    font-family: '{{fontSmall}}', monospace;
    font-size: 20px;
    color: {{textPrimary}};
    opacity: 0.7;
  }
  .swipe {
    font-size: 36px;
    color: {{textPrimary}};
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="label">{{label}}</div>
  <div class="headline">{{headline}}</div>
  <div class="subtitle">{{subtitle}}</div>
  <div class="footer">
    <div class="handle">Post by {{handle}}</div>
    <div class="swipe">→</div>
  </div>

  <script>
    const headline = document.querySelector('.headline');
    const len = headline.textContent.length;
    if (len < 20) headline.style.fontSize = '160px';
    else if (len < 30) headline.style.fontSize = '140px';
    else if (len < 45) headline.style.fontSize = '120px';
    else if (len < 60) headline.style.fontSize = '105px';
    else if (len < 80) headline.style.fontSize = '90px';
    else if (len < 110) headline.style.fontSize = '75px';
    else headline.style.fontSize = '62px';
  </script>
</body>
</html>
