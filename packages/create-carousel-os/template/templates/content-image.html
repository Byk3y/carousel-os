<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family={{fontHeadline}}:wght@400;500;700&family={{fontBody}}:wght@400;500;700&family={{fontSmall}}&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    background: {{textPrimary}};
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: '{{fontBody}}', sans-serif;
  }
  .card {
    width: 1020px;
    height: 1290px;
    background: {{contentBackground}};
    border-radius: {{cornerRadius}}px;
    padding: 48px 56px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  /* Decorative circuit lines */
  .decor-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    opacity: 0.04;
    overflow: hidden;
  }
  .decor-bg svg {
    width: 100%;
    height: 100%;
  }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }
  .handle-top {
    font-family: '{{fontSmall}}', monospace;
    font-size: 20px;
    color: {{textSecondary}};
    opacity: 0.5;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .slide-number {
    font-family: '{{fontSmall}}', monospace;
    font-size: 24px;
    color: {{textSecondary}};
    opacity: 0.5;
    font-weight: 700;
  }
  .label {
    font-family: '{{fontSmall}}', monospace;
    font-size: 24px;
    color: {{accent}};
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }
  .headline {
    font-family: '{{fontHeadline}}', sans-serif;
    font-weight: 400;
    font-size: 88px;
    color: {{textPrimary}};
    line-height: 0.95;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }
  .headline .highlight {
    color: {{accent}};
  }
  .body-text {
    font-family: '{{fontBody}}', sans-serif;
    font-size: 30px;
    font-weight: 500;
    color: {{textPrimary}};
    line-height: 1.4;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    position: relative;
    z-index: 1;
  }
  /* Image wrapper centers the tightly-ringed image */
  .image-wrap {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .image-container {
    display: inline-block;
    border: 4px solid {{accent}};
    border-radius: 12px;
    overflow: hidden;
    line-height: 0;
  }
  .image-container img {
    max-width: 100%;
    max-height: 900px;
    width: auto;
    height: auto;
    display: block;
  }
  /* Main content area */
  .content-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 16px;
    padding: 16px 0;
  }
  .card-footer {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding-top: 24px;
    position: relative;
    z-index: 1;
  }
  .handle {
    font-family: '{{fontSmall}}', monospace;
    font-size: 18px;
    color: {{textSecondary}};
    opacity: 0.4;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .swipe {
    position: absolute;
    bottom: 0;
    right: 0;
    font-size: 36px;
    color: {{accent}};
    opacity: 0.5;
  }
</style>
</head>
<body>
  <div class="card">
    <!-- Decorative background pattern -->
    <div class="decor-bg">
      <svg viewBox="0 0 1020 1290" xmlns="http://www.w3.org/2000/svg">
        <line x1="200" y1="0" x2="200" y2="400" stroke="currentColor" stroke-width="1"/>
        <line x1="200" y1="400" x2="500" y2="400" stroke="currentColor" stroke-width="1"/>
        <line x1="500" y1="400" x2="500" y2="200" stroke="currentColor" stroke-width="1"/>
        <line x1="800" y1="0" x2="800" y2="300" stroke="currentColor" stroke-width="1"/>
        <line x1="800" y1="300" x2="600" y2="300" stroke="currentColor" stroke-width="1"/>
        <circle cx="200" cy="400" r="4" fill="currentColor"/>
        <circle cx="500" cy="400" r="4" fill="currentColor"/>
        <circle cx="800" cy="300" r="4" fill="currentColor"/>
        <line x1="100" y1="900" x2="100" y2="1290" stroke="currentColor" stroke-width="1"/>
        <line x1="100" y1="900" x2="400" y2="900" stroke="currentColor" stroke-width="1"/>
        <line x1="700" y1="800" x2="700" y2="1100" stroke="currentColor" stroke-width="1"/>
        <line x1="700" y1="1100" x2="920" y2="1100" stroke="currentColor" stroke-width="1"/>
        <circle cx="100" cy="900" r="4" fill="currentColor"/>
        <circle cx="700" cy="1100" r="4" fill="currentColor"/>
      </svg>
    </div>

    <div class="top-row">
      <div class="handle-top">{{handle}}</div>
      <div class="slide-number">{{number}}</div>
    </div>
    <div class="content-area">
      <div>
        <div class="label">{{label}}</div>
        <div class="headline">{{headline}}</div>
      </div>
      <div class="image-wrap">
        <div class="image-container">
          <img src="{{imagePath}}">
        </div>
      </div>
      <div class="body-text">{{body}}</div>
    </div>
    <div class="card-footer">
      <div class="handle">{{handle}}</div>
      <div class="swipe">↗</div>
    </div>
  </div>

  <script>
    const headline = document.querySelector('.headline');
    const body = document.querySelector('.body-text');
    const hLen = headline.textContent.length;
    const bLen = body.textContent.length;

    if (hLen < 15) headline.style.fontSize = '64px';
    else if (hLen < 25) headline.style.fontSize = '54px';
    else if (hLen < 40) headline.style.fontSize = '46px';
    else if (hLen < 55) headline.style.fontSize = '38px';
    else if (hLen < 75) headline.style.fontSize = '30px';
    else if (hLen < 100) headline.style.fontSize = '26px';
    else headline.style.fontSize = '22px';

    if (bLen < 60) body.style.fontSize = '40px';
    else if (bLen < 120) body.style.fontSize = '36px';
    else if (bLen < 200) body.style.fontSize = '32px';
    else if (bLen < 300) body.style.fontSize = '28px';
    else body.style.fontSize = '24px';
  </script>
</body>
</html>
